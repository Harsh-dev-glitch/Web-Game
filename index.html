<!DOCTYPE html>
<html>
<body>

<canvas id="game" width="800" height="400" style="border:1px solid black"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function gameLoop() {
    ctx.clearRect(0,0,800,400);

    // Sky
    ctx.fillStyle = "skyblue";
    ctx.fillRect(0,0,800,400);

    // Ground
    ctx.fillStyle = "green";
    ctx.fillRect(0,300,800,100);

    // Car
    ctx.fillStyle = "red";
    ctx.fillRect(100,250,60,30);

    // Wheels
    ctx.fillStyle = "black";
    ctx.beginPath();
    ctx.arc(115,280,8,0,Math.PI*2);
    ctx.arc(145,280,8,0,Math.PI*2);
    ctx.fill();

    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
